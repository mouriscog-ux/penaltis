<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Penalty Challenge - Precision Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <!-- Entrada Direta -->
        <section id="menu-screen" class="screen active">
            <h1 class="main-title">PENALTY CHALLENGE</h1>
            <p class="main-subtitle">SÉRIE A - PRECISION EDITION</p>
            <button onclick="nav('selection')" class="btn-start">Jogar Campeonato</button>
        </section>

        <!-- Seleção -->
        <section id="selection-screen" class="screen">
            <h2 class="ui-title">SELECIONE SEU CLUBE</h2>
            <div id="teams-grid"></div>
            <button id="start-btn" disabled onclick="initGame()" class="btn-start">Entrar na Arena</button>
        </section>

        <!-- Arena (720p Fixa) -->
        <section id="game-screen" class="screen">
            <div id="hud-master">
                <div class="match-box">
                    <div class="team-side">
                        <img id="p-logo" src="">
                        <span id="p-goals">0</span>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="team-side">
                        <span id="ai-goals">0</span>
                        <img id="ai-logo" src="">
                    </div>
                </div>
                <div id="stage-label">OITAVAS DE FINAL</div>
                <div id="round-dots"></div>
                <!-- Barra de Força Precision -->
                <div id="power-bar-container">
                    <div id="power-bar-fill"></div>
                    <div class="power-marker">80%</div>
                </div>
            </div>

            <div id="viewport">
                <canvas id="gameCanvas"></canvas>
                <div id="aim-reticle"></div>
                <div id="ai-hint"></div> <!-- Dica do Friv -->
            </div>

            <div id="game-msg">PREPARE O CHUTE</div>
            <div class="controls-legend">
                SETAS: MOVER MIRA | ESPAÇO: CARREGAR/SOLTAR CHUTE
            </div>
        </section>

        <!-- Final / Troféu -->
        <section id="final-screen" class="screen">
            <div class="victory-box">
                <img id="winner-img" src="">
                <h1 class="glow-text">CAMPEÃO!</h1>
            </div>
            <button onclick="location.reload()" class="btn-start">Reiniciar</button>
        </section>
    </div>
    <script src="game.js"></script>
</body>
</html>
