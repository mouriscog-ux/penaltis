<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Glory - KILLER EDITION</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="kill-switch-screen">
        <!-- ENTRADA DIRETA: SEM PÁGINAS DE CARREGAMENTO -->
        <div id="main-menu" class="active-screen">
            <h1 class="glory-title">PENALTY GLORY</h1>
            <div class="subtitle-neon">BRASILEIRÃO ELITE</div>
            <button onclick="changeScreen('team-selection')" class="btn-direct">SELEÇÃO DE TIMES</button>
        </div>

        <div id="team-selection" class="hidden-screen">
            <h2 class="ui-title">ESCOLHA SEU ESCUDO</h2>
            <div id="teams-grid"></div>
            <button id="start-btn" disabled onclick="startGame()" class="btn-direct">DISPUTAR MATA-MATA</button>
        </div>

        <div id="game-screen" class="hidden-screen">
            <div id="game-hud">
                <div class="score-container">
                    <div class="team-label" id="p-team-name">VOCÊ</div>
                    <div class="score-box"><span id="p-score">0</span> - <span id="ai-score">0</span></div>
                    <div class="team-label" id="ai-team-name">IA</div>
                </div>
                <div id="turn-indicator">VOCÊ BATE</div>
                <div id="shots-left">ROUND: 1/5</div>
            </div>

            <div id="viewport-wrap">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="action-msg">CARREGANDO...</div>
            <div id="controls-panel">SETAS: MIRAR/PULAR | ESPAÇO: CHUTAR</div>
        </div>

        <div id="victory-screen" class="hidden-screen">
            <div id="trophy-award">
                <img id="winner-shield" src="" alt="">
                <h1 class="bounce-text">CAMPEÃO!</h1>
            </div>
            <button onclick="location.reload()" class="btn-direct">REJOGAR</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
