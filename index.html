<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Penalty & Glory - Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Menu Principal -->
        <section id="main-menu" class="screen">
            <h1 class="master-title">PENALTY & GLORY</h1>
            <p class="master-subtitle">BRASILEIRÃO MASTER</p>
            <div class="menu-actions">
                <button onclick="showScreen('team-selection')" class="btn-master">Começar Temporada</button>
            </div>
            <div id="init-check">Verificando Protocolos Zero-Error...</div>
        </section>

        <!-- Seleção de Time -->
        <section id="team-selection" class="screen" style="display: none;">
            <h2 class="section-title">SELECIONE SEU CLUBE</h2>
            <div id="teams-grid"></div>
            <div class="selection-footer">
                <button id="start-btn" disabled class="btn-master">Entrar no Caldeirão</button>
            </div>
        </section>

        <!-- Arena (Centralizada 1280x720) -->
        <section id="game-screen" class="screen" style="display: none;">
            <div id="hud">
                <div class="top-row">
                    <div class="match-info">
                        <img id="team-logo-hud" src="">
                        <span id="match-phase">OITAVAS DE FINAL</span>
                    </div>
                    <div class="scoreboard-master">
                        <div class="player-side">VOCÊ: <span id="player-score">0</span></div>
                        <div class="vs-label">VS</div>
                        <div class="ai-side">IA: <span id="ai-score">0</span></div>
                    </div>
                </div>
                <!-- Barra de Confiança (Master Link 3) -->
                <div class="confidence-container">
                    <div id="confidence-bar"></div>
                    <div class="confidence-label">BARRA DE CONFIANÇA</div>
                </div>
                <div id="status-display">PREPARE-SE</div>
            </div>

            <div id="stadium">
                <div id="weather-effect"></div>
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="advanced-hints">
                <div id="mode-hint">VOCÊ É O BATEDOR</div>
                <div class="controls-list">⬇️ RECUAR | ⬆️ CORRER | ⬅️➡️ ANGULAR | SHIFT: TRIVELA</div>
            </div>
        </section>

        <!-- Troféu / Fim -->
        <section id="victory-screen" class="screen" style="display: none;">
            <div id="trophy-container">
                <img id="champion-shield" src="">
                <h1 class="winner-text">CAMPEÃO BRASILEIRO!</h1>
            </div>
            <button onclick="location.reload()" class="btn-master">Reiniciar</button>
        </section>
    </div>

    <script src="game.js"></script>
</body>
</html>
